<!DOCTYPE html>
<html>
<head>
    <title>AuthentiAI - Ultimate AI Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #FFD700;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }
        .glow { 
            box-shadow: 0 0 30px #FFD700, inset 0 0 30px #FFD700;
            border: 2px solid #FFD700;
        }
        .dropzone {
            width: 80%; height: 300px; margin: 50px auto;
            border: 4px dashed #FFD700;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s;
            font-size: 24px; text-align: center;
        }
        .dropzone:hover { transform: scale(1.02); }
        .dropzone.dragover { background: rgba(255,215,0,0.1); }
        .results { 
            width: 80%; margin: 30px auto; padding: 30px;
            min-height: 400px; border-radius: 20px;
        }
        .timeline {
            height: 60px; background: #111;
            border-radius: 30px; margin: 20px 0;
            position: relative; overflow: hidden;
        }
        .timeline-segment {
            height: 100%; float: left; transition: all 0.5s;
        }
        .human { background: #00FF00; }
        .suspicious { background: #FFD700; }
        .ai { background: #FF0000; }
        .score-circle {
            width: 150px; height: 150px; border-radius: 50%;
            margin: 20px auto; display: flex; align-items: center;
            justify-content: center; font-size: 36px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div style="text-align: center; padding: 50px;">
        <h1 style="font-size: 48px; text-shadow: 0 0 40px #FFD700; margin-bottom: 20px;">
            🔍 AuthentiAI Detector
        </h1>
        <p style="font-size: 20px; opacity: 0.8;">Upload Video/Audio/Text → Instant Analysis</p>
    </div>

    <div class="dropzone glow" id="dropzone">
        <div>🚀 Drag & Drop ANY File Here<br>
             <small>Video • Audio • Text • Supports all formats</small></div>
        <input type="file" id="fileInput" multiple accept="video/*,audio/*,.txt,.mp4,.wav" style="display: none;">
    </div>

    <div id="results" class="results glow" style="display: none;">
        <div style="text-align: center;">
            <h2 style="margin-bottom: 20px;">📊 Detection Results</h2>
            
            <div class="score-circle human" id="finalScore">
                <div>92%</div><div style="font-size: 18px;">HUMAN CONFIDENCE</div>
            </div>
            
            <div style="display: flex; justify-content: space-around; margin: 30px 0;">
                <div>🎥 Video: <span style="color: #00FF00">94%</span></div>
                <div>🔊 Audio: <span style="color: #FFD700">82%</span></div>
                <div>📝 Text: <span style="color: #00FF00">91%</span></div>
            </div>
            
            <div>Risk Level: <span style="color: #00FF00; font-size: 24px; font-weight: bold;">LOW</span></div>
            
            <div class="timeline" id="timeline"></div>
            
            <div style="margin-top: 20px;">
                <button onclick="downloadPDF()" class="glow" style="
                    background: transparent; color: #FFD700; border: 2px solid #FFD700;
                    padding: 15px 30px; border-radius: 25px; font-size: 18px; cursor: pointer;
                ">📥 Download Authenticity Report (PDF)</button>
            </div>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const results = document.getElementById('results');
        const timeline = document.getElementById('timeline');

        // Drag & Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            dropzone.addEventListener(event, preventDefaults, false);
        });
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover'].forEach(event => {
            dropzone.addEventListener(event, () => dropzone.classList.add('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(event => {
            dropzone.addEventListener(event, () => dropzone.classList.remove('dragover'), false);
        });

        dropzone.addEventListener('drop', handleDrop);
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);

        function handleDrop(e) {
            const files = e.dataTransfer.files;
            analyzeFiles(files);
        }

        function handleFiles() {
            analyzeFiles(fileInput.files);
        }

        function analyzeFiles(files) {
            if (!files.length) return;
            
            // Simulate your exact detection pipeline
            setTimeout(() => {
                const segments = generateTimeline();
                showResults(segments);
            }, 2000);
        }

        function generateTimeline() {
            const segments = [];
            const totalDuration = 45; // seconds
            let pos = 0;
            
            // Mixed content: Human → AI → Human
            segments.push({start: pos, end: pos+=12, type: 'human', confidence: 95});
            segments.push({start: pos, end: pos+=18, type: 'ai', confidence: 88});
            segments.push({start: pos, end: pos+=15, type: 'suspicious', confidence: 65});
            
            return segments;
        }

        function showResults(segments) {
            // Your scoring formula
            const videoScore = 94, audioScore = 82, textScore = 91, temporal = 88;
            const finalScore = 0.35*videoScore + 0.30*audioScore + 0.25*textScore + 0.10*temporal;
            
            document.getElementById('finalScore').innerHTML = 
                `${finalScore.toFixed(1)}%<div style="font-size: 18px;">HUMAN CONFIDENCE</div>`;
            document.getElementById('finalScore').className = 
                finalScore > 80 ? 'score-circle human' : 
                finalScore > 60 ? 'score-circle suspicious glow' : 'score-circle ai';
            
            // Timeline
            timeline.innerHTML = '';
            segments.forEach(seg => {
                const div = document.createElement('div');
                div.className = `timeline-segment ${seg.type}`;
                div.style.width = `${(seg.end-seg.start)/45*100}%`;
                div.title = `${seg.start}-${seg.end}s: ${seg.confidence}% ${seg.type.toUpperCase()}`;
                timeline.appendChild(div);
            });
            
            results.style.display = 'block';
            document.body.scrollTo(0, document.body.scrollHeight);
        }

        function downloadPDF() {
            // Generate PDF with jsPDF (your blockchain cert stub)
            alert('PDF Report Downloaded!\n\nAuthenticity Certificate #AUTH' + Date.now());
        }
    </script>
</body>
</html>
